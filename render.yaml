services:
  - type: web
    name: groq-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false # You will enter this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
